name: macOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: true
        default: 'auto'
        type: choice
        options:
        - auto
        - x86_64
        - arm64

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-12, macos-13]
        architecture: [x86_64, arm64]
        exclude:
          # Exclude older macOS versions for ARM64
          - os: macos-12
            architecture: arm64
          - os: macos-13
            architecture: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Install dependencies
      run: |
        brew install ccache
        brew install python@3.11

    - name: Setup environment
      run: |
        if [ "${{ matrix.architecture }}" = "arm64" ]; then
          export MOZCONFIG="mozconfig-macos-arm64"
          export MACOSX_DEPLOYMENT_TARGET="11.0"
        else
          export MOZCONFIG="mozconfig-macos-x86_64"
          export MACOSX_DEPLOYMENT_TARGET="10.15"
        fi
        
        echo "MOZCONFIG=$MOZCONFIG" >> $GITHUB_ENV
        echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET" >> $GITHUB_ENV
        echo "MOZ_PARALLEL_BUILD=4" >> $GITHUB_ENV

    - name: Configure build
      run: |
        ./mach configure

    - name: Build
      run: |
        ./mach build
      timeout-minutes: 120

    - name: Run tests
      run: |
        ./mach test --headless
      timeout-minutes: 60

    - name: Package
      run: |
        ./mach package
      timeout-minutes: 30

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mozilla-gecko-${{ matrix.architecture }}-${{ matrix.os }}
        path: |
          obj-*/dist/*.dmg
          obj-*/dist/*.tar.bz2
        retention-days: 7

  build-universal:
    runs-on: macos-latest
    needs: build
    if: github.event.inputs.architecture == 'auto' || github.event.inputs.architecture == ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Install dependencies
      run: |
        brew install ccache
        brew install python@3.11

    - name: Setup universal environment
      run: |
        export MOZCONFIG="mozconfig-macos-universal"
        export MOZ_PARALLEL_BUILD=4
        
        echo "MOZCONFIG=$MOZCONFIG" >> $GITHUB_ENV
        echo "MOZ_PARALLEL_BUILD=4" >> $GITHUB_ENV

    - name: Configure universal build
      run: |
        ./mach configure

    - name: Build universal
      run: |
        ./mach build
      timeout-minutes: 120

    - name: Package universal
      run: |
        ./mach package
      timeout-minutes: 30

    - name: Upload universal artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mozilla-gecko-universal-macos
        path: |
          obj-*/dist/*.dmg
          obj-*/dist/*.tar.bz2
        retention-days: 7